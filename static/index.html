<button id="helpButton">Help</button>
<div id="helpModal" style="display:none;">
    <div>
        <h2>API Key Instructions</h2>
        <p>To use the API, you need to have a valid API key. You can obtain your API key from the API provider's website. Please enter it in the designated field when prompted.</p>
        <button id="closeButton">Close</button>
    </div>
</div>
<script>
    document.getElementById('helpButton').onclick = function() {
        document.getElementById('helpModal').style.display = 'block';
    };
    document.getElementById('closeButton').onclick = function() {
        document.getElementById('helpModal').style.display = 'none';
    };
</script>
